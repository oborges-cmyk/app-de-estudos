<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstudeJá</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <button id="tema">🌙</button>
    <h1>📚 EstudeJá</h1>

    <p id="frase"></p>

    <div class="pomodoro">

        <h2 id="timer">25:00</h2>
    
        <button onclick="iniciar()">Iniciar</button>
        <button id="btnPausar" onclick="pausar()">Pausar</button>
        <button onclick="resetar()">Resetar</button>
    
        <br><br>
    
        <button onclick="modo2510()">25/5</button>
        <button onclick="modo5010()">50/10</button>
    
    </div>
    
    <div class="tarefas">
    
    <input type="text" id="tarefa" placeholder="Nova tarefa">
    <button onclick="adicionar()">Adicionar</button>
    
    <ul id="lista"></ul>
    
    </div>

    <div class="progresso">
    <h3>Progresso</h3>
    <div class="barra">
    <div id="preenchimento"></div>
    </div>
    <p id="porcentagem">0%</p>
    </div>

    <div class="flashcards">

        <h2>🧠 Flashcards</h2>
        
        <input type="text" id="pergunta" placeholder="Pergunta">
        <input type="text" id="resposta" placeholder="Resposta">
        
        <button onclick="criarFlashcard()">
        Adicionar Card
        </button>
        
        <div id="areaFlashcards"></div>
        
        </div>

        <p> Uma maneira simples de organizar os estudos/tarefas que você possui </p>
    
    <script src="script.js" defer> </script>
</body>
</html>
